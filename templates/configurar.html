<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración Phoenix - HoldCapital.io</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-phoenix { background-color: #00CC96; color: white; border-radius: 10px; font-weight: bold; }
        .btn-phoenix:hover { background-color: #00b383; color: white; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Sistema Phoenix</h2>
                        <p class="text-muted">Vinculación de Credenciales de Inversión</p>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label text-secondary">API Key del Exchange</label>
                            <input type="text" name="api_key" class="form-control" placeholder="Ej: 4pX9..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Secret Key</label>
                            <input type="password" name="api_secret" class="form-control" placeholder="••••••••••••" required>
                        </div>
                        <hr class="my-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Contraseña de Operaciones</label>
                            <input type="password" name="pass_ops" class="form-control border-primary" placeholder="Su llave maestra de cifrado" required>
                            <div class="form-text">Esta contraseña NUNCA se guarda. Es la única forma de descifrar sus llaves para que el sistema funcione.</div>
                        </div>
                        
                        <button type="submit" class="btn btn-phoenix w-100 py-3 mt-3">ACTIVAR SISTEMA PHOENIX</button>
                    </form>
                </div>
                <p class="text-center mt-4 text-muted small">© 2026 HoldCapital.io | Tecnología de Cifrado de Extremo a Extremo</p>
            </div>
        </div>
    </div>
</body>
</html>
