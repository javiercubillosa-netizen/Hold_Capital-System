<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoldCapital.io | Phoenix System</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #d4af37;
            padding: 40px;
            border-radius: 15px;
            background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            max-width: 800px;
            width: 95%;
        }
        h1 {
            color: #d4af37;
            font-size: 2.8rem;
            margin-bottom: 5px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #d4af37;
            padding: 20px;
            border-radius: 12px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }
        .card h3 {
            color: #888;
            font-size: 0.85rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card .value {
            color: #d4af37;
            font-size: 2rem;
            font-weight: bold;
        }
        .table-container {
            background: #0a0a0a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #222;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: #1a1a1a;
            color: #d4af37;
            padding: 15px;
            text-align: left;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #111;
            text-align: left;
        }
        .status {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #00ff88;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HOLDCAPITAL.IO</h1>
        <p class="subtitle">Ecosistema Digital de Alta Precisión | {{ cliente }}</p>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Capital Real-Time (Binance)</h3>
                <div class="value" id="saldo-binance">$ {{ saldo }}</div>
            </div>
            <div class="card">
                <h3>Saldo Gas Phoenix</h3>
                <div class="value" id="saldo-gas">$ {{ gas }}</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Motor</th>
                        <th>Par</th>
                        <th>Tipo</th>
                        <th>Ganancia</th>
                    </tr>
                </thead>
                <tbody id="tabla-operaciones">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #555; padding: 25px;">
                            Monitoreando señales de los motores Phoenix...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="status" id="sistema-status">
            ● Phoenix System: Conectado | Modo Cloud Activo
        </div>
    </div>

    <script>
    function traerDatos() {
        // Usamos la nueva ruta '/actualizar' para matar el 404
        fetch('/actualizar')
            .then(res => res.json())
            .then(data => {
                document.getElementById('saldo-binance').innerText = '$ ' + data.saldo;
                document.getElementById('saldo-gas').innerText = '$ ' + data.gas;
                document.getElementById('sistema-status').innerText = '● ' + data.status;
            })
            .catch(e => console.log("Sincronizando..."));
    }
    
    // Ejecutar de inmediato y cada 20 segundos
    traerDatos();
    setInterval(traerDatos, 20000);
</script>
</body>
</html>
